{% extends "base.html" %}

{% block content %}
<div class="login-clean-container">
    <div class="login-card">
        <h2>Daftar Akun Baru</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                {{ form.as_p }}
            </div>
            
            <button type="submit" class="btn-login-submit">Daftar (Sign Up)</button>
        </form>
    </div>
</div>
{% endblock content %}
