{% extends "base.html" %}

{% block content %}
<div class="login-clean-container">
    <div class="login-card">
        <h2>Tambah Kategori Baru</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                {{ form.as_p }}
            </div>
            
            <button type="submit" class="btn-login-submit">Simpan Kategori</button>
        </form>
        
        <a href="{% url 'product_new' %}" style="display:block; text-align:center; margin-top:15px; font-size:13px; color:#555; text-decoration:none;">
            ← Kembali ke Tambah Produk
        </a>
    </div>
</div>
{% endblock content %}
